# Nixpacks config for Railway
# Node 22 + pnpm 10 monorepo. pnpm is provided by Nix (no corepack).

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]
nixLibs = ["libuuid"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile --prod=false"]

[phases.build]
cmds = ["pnpm --filter @eduright/web build"]

[start]
cmd = "pnpm --filter @eduright/api start"
